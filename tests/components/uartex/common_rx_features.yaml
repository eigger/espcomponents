external_components:
  - source:
      type: local
      path: ../../../components
    components: [ uartex ]

esphome:
  name: test-uartex-rx-features

uart:
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: ${rx_pin}
  tx_pin: ${tx_pin}

# Multi-candidate rx_header, header-aware rx_checksum, and rx_reply (static + lambda).
uartex:
  id: uartex_rx_features
  rx_timeout: 10ms
  tx_delay: 0ms
  tx_timeout: 500ms
  tx_retry_cnt: 3
  rx_length: 4
  rx_header:
    - [0xA0]
    - [0xA1]
  rx_checksum: !lambda |-
    uint8_t crc = header[0];
    for (size_t i = 0; i < len; i++)
      crc ^= data[i];
    return crc;
  tx_checksum: xor_no_header
  rx_reply:
    - state: [0x51]
      command: [0xA0, 0x51, 0x00]
    - state: [0x52]
      command: !lambda 'return {{0xA0, 0x52, data[1]}};'
  version:
    disabled: true
  error:
    disabled: true
  log:
    disabled: true

# Second uartex instance: single header must not merge with the list above.
uartex:
  id: uartex_single_header
  rx_timeout: 10ms
  tx_delay: 50ms
  tx_timeout: 500ms
  tx_retry_cnt: 3
  rx_length: 4
  rx_header: [0xB0]
  rx_checksum: !lambda |-
    uint8_t crc = header[0];
    for (size_t i = 0; i < len; i++)
      crc ^= data[i];
    return crc;
  tx_checksum: xor_no_header
  version:
    disabled: true
  error:
    disabled: true
  log:
    disabled: true

binary_sensor:
  - platform: uartex
    name: Rx Features Ping
    uartex_id: uartex_rx_features
    state: [0x50]
    state_on:
      data: [0x01]
    state_off:
      data: [0x00]

switch:
  - platform: uartex
    name: Single Header Switch
    uartex_id: uartex_single_header
    state: [0x10]
    state_on:
      data: [0x01]
    state_off:
      data: [0x00]
    command_on:
      data: [0x10, 0x01]
    command_off:
      data: [0x10, 0x00]
