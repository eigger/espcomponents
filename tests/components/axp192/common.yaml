external_components:
  - source:
      type: local
      path: ../../../components
    components: [ axp192 ]

esphome:
  name: test-axp192

i2c:
  - id: bus_a
    sda: ${sda}
    scl: ${scl}
    scan: true

axp192:
  address: 0x34
  i2c_id: bus_a
  update_interval: 30s
  battery_level:
    name: "Battery Level"
  battery_state:
    name: "Battery State"
  battery_charging:
    name: "Battery Charging"
  brightness:
    name: "Screen Brightness"
  poweroff:
    name: "Power Off Button"
