external_components:
  - source:
      type: local
      path: ../../../components
    components: [ ip5306 ]

esphome:
  name: test-ip5306

i2c:
  sda: ${sda}
  scl: ${scl}
  scan: true

ip5306:
  battery_level:   # sensor
    name: Battery Level
  charger_connected:  # binary_sensor
    id: connected
    on_press:
      then:
        - lambda: ESP_LOGD("TEST", "charging");
    on_release:
      then:
        - lambda: ESP_LOGD("TEST", "not charging");
  charge_full:  # binary_sensor
    id: full
    on_press:
      then:
        - lambda: ESP_LOGD("TEST", "fully charged");
    on_release:
      then:
        - lambda: ESP_LOGD("TEST", "still charging");
