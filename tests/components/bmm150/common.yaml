external_components:
  - source:
      type: local
      path: ../../../components
    components: [ bmm150 ]

esphome:
  name: test-bmm150

i2c:
  sda: ${sda}
  scl: ${scl}
  scan: true
     
sensor:
  - platform: bmm150
    address: 0x10
    update_interval: 30s
    magnetic_field_x:
      name: "MAG X"
    magnetic_field_y:
      name: "MAG Y"
    magnetic_field_z:
      name: "MAG Z"
