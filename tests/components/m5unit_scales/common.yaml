external_components:
  - source:
      type: local
      path: ../../../components
    components: [ m5unit_scales ]

esphome:
  name: test-m5unit-scales

i2c:
  sda: ${sda}
  scl: ${scl}
  scan: true

# Main Hub Component
m5unit_scales:
  id: my_scale
  model: MINI  # MINI (Unit-Mini Scales) or STANDARD (Unit Scales)
  address: 0x26
  update_interval: 1s

# Exposed Sensors
sensor:
  - platform: m5unit_scales
    weight:
      name: "Scale Weight"
    absolute_weight:
      name: "Scale Absolute Weight"
    raw_adc:
      name: "Scale Raw ADC"

# Binary Sensor for physical button
binary_sensor:
  - platform: m5unit_scales
    button:
      name: "Scale Button"

# Tare Trigger
button:
  - platform: m5unit_scales
    tare:
      name: "Scale Tare"

# RGB LED Output
light:
  - platform: m5unit_scales
    name: "Scale LED"

# Filter Controls (Only supported/used on MINI model)
switch:
  - platform: m5unit_scales
    lp_filter:
      name: "Scale LP Filter"

number:
  - platform: m5unit_scales
    avg_filter:
      name: "Scale Avg Filter"
    ema_filter:
      name: "Scale EMA Filter"
    gap:
      name: "Scale Gap Value"
