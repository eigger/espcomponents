  - platform: template
    name: "Roll"
    id: id_device_roll
    icon: "mdi:rotate-left"
    unit_of_measurement: "°"
    accuracy_decimals: 1
    state_class: measurement
    update_interval: 200ms
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
    lambda: |-
      float ax = id(id_bmi270_accel_x).state;
      float ay = id(id_bmi270_accel_y).state;
      float az = id(id_bmi270_accel_z).state;
      if (isnan(ax) || isnan(ay) || isnan(az)) return NAN;
      float raw = atan2(-ay, sqrt(ax*ax + az*az)) * 180.0f / (float)M_PI;
      return raw - id(g_roll_offset);
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_roll_value
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[12]; snprintf(buf, sizeof(buf), "%+.1f°", x); return std::string(buf);
        - lvgl.image.update:
            id: img_roll_icon
            angle: !lambda |-
              if (isnan(x)) return 0;
              int a = (int)(x * 10.0f);
              a = ((a % 3600) + 3600) % 3600;
              return a;
        - lvgl.label.update:
            id: lbl_roll_title
            text_color: !lambda |-
              return (std::abs(id(g_roll_offset)) > 0.0001f) ? lv_color_hex(0xF1C36C) : lv_color_hex(0x7F8EA3);

