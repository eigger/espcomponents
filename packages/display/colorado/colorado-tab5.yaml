                    - label: { text: "실내습도", align: top_mid, x: 0, y: 8, text_color: 0x7F8EA3, text_font: notosans16 }
                    - label: { id: lbl_cabin_humidity, text: "--", align: bottom_left, x: 46, y: -5, text_color: 0xE0E8F4, text_font: notosans25 }
                    - label: { text: "%", align: bottom_right, x: -5, y: -7, text_color: 0x7F8EA3, text_font: notosans16 }
              # 실외 온도 (Bed)
              - obj:
                  align: left_mid
                  x: 374
                  width: 172
                  height: 73
                  bg_color: 0x141C26
                  radius: 12
                  border_width: 1
                  border_color: 0x1E2A38
                  pad_all: 0
                  widgets:
