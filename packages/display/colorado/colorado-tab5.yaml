                      width: 28
                      height: 28
                      spin_time: 800ms
                      arc_length: 90deg
                      arc_width: 3
                      bg_color: 0x1E2A38
                      indicator:
                        arc_color: 0xF1C36C
                  - label: { text: "${version}", align: bottom_mid, y: -38, text_color: 0x7F8EA3, text_font: notosans20 }

  pages:
    # =============================================================
    # MAIN PAGE: Focus Drive (단일 페이지)
    # =============================================================
    - id: main_page
      bg_color: 0x0B0F14
      widgets:

        # ────────────────────────────────────────────────────────
