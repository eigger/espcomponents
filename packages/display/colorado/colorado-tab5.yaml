                    - label: { text: "실외온도", align: top_mid, x: 0, y: 8, text_color: 0x7F8EA3, text_font: notosans16 }
                    - label: { id: lbl_bed_temperature, text: "--", align: bottom_left, x: 46, y: -5, text_color: 0xE0E8F4, text_font: notosans25 }
                    - label: { text: "°C", align: bottom_right, x: -5, y: -7, text_color: 0x7F8EA3, text_font: notosans16 }
              # 실외 습도 (Bed)
              - obj:
                  align: left_mid
                  x: 554
                  width: 172
                  height: 73
                  bg_color: 0x141C26
                  radius: 12
                  border_width: 1
                  border_color: 0x1E2A38
                  pad_all: 0
                  widgets:
                    - image: { src: img_water_sm, align: top_left, x: 10, image_recolor: 0xF1C36C, image_recolor_opa: 100% }
                    - label: { text: "실외습도", align: top_mid, x: 0, y: 8, text_color: 0x7F8EA3, text_font: notosans16 }
                    - label: { id: lbl_bed_humidity, text: "--", align: bottom_left, x: 46, y: -5, text_color: 0xE0E8F4, text_font: notosans25 }
                    - label: { text: "%", align: bottom_right, x: -5, y: -7, text_color: 0x7F8EA3, text_font: notosans16 }
              # CO2
              - obj:
                  align: left_mid
                  x: 734
                  width: 172
                  height: 73
                  bg_color: 0x141C26
                  radius: 12
                  border_width: 1
                  border_color: 0x1E2A38
                  pad_all: 0
                  widgets:
                    - image: { src: img_co2_sm, align: top_left, x: 10, image_recolor: 0xF1C36C, image_recolor_opa: 100% }
                    - label: { text: "CO2", align: top_mid, x: 0, y: 8, text_color: 0x7F8EA3, text_font: notosans16 }
                    - label: { id: lbl_cabin_co2, text: "--", align: bottom_left, x: 46, y: -5, text_color: 0xE0E8F4, text_font: notosans25 }
                    - label: { text: "ppm", align: bottom_right, x: -5, y: -7, text_color: 0x7F8EA3, text_font: notosans16 }
              # TVOC
              - obj:
                  align: left_mid
                  x: 914
                  width: 172
                  height: 73
                  bg_color: 0x141C26
                  radius: 12
                  border_width: 1
                  border_color: 0x1E2A38
                  pad_all: 0
