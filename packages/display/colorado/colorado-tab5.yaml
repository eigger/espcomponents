script:
  - id: script_splash_fade_in
    then:
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 30%
      - delay: 50ms
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 58%
      - delay: 50ms
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 100%
  - id: script_splash_fade_out
    then:
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 70%
      - delay: 40ms
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 38%
      - delay: 40ms
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 12%
      - delay: 40ms
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 0%
      - delay: 60ms
  - id: script_ble_write
    mode: queued
    parameters:
      msg: string
    then:
      - ble_client.ble_write:
          id: vlinker
          service_uuid: 18F0
          characteristic_uuid: 2AF1
          value: !lambda |-
            std::vector<uint8_t> v(msg.begin(), msg.end());
            v.push_back('\r');
            return v;
  - id: script_logs
    parameters:
      log: string
    then:
      - lvgl.textarea.update:
          id: textarea_log
          text: !lambda |-
            auto &vec = id(g_logs);
            char buf[100];
            auto time = id(sntp_time).now();
            sprintf(buf, "[%02d:%02d:%02d] %s", time.hour, time.minute, time.second, log.c_str());
            vec.push_back(std::string(buf));
            if (vec.size() > 10) vec.erase(vec.begin());
            std::string str;
            for (auto temp : vec) {
              str += temp;
              if (!temp.ends_with("\r\n")) str += "\r\n";
            }
            id(g_logs) = vec;
            return str;
