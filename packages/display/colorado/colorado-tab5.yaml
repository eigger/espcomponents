script:
  - id: script_splash_fade_in
    then:
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 30%
      - delay: 50ms
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 58%
      - delay: 50ms
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 100%
  - id: script_splash_fade_out
    then:
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 70%
      - delay: 40ms
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 38%
      - delay: 40ms
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 12%
      - delay: 40ms
      - lvgl.widget.update:
          id: obj_splash_content
          opa: 0%
      - delay: 60ms
  - id: script_logs
    parameters:
      log: string
    then:
      - lambda: |-
          auto &vec = id(g_logs);
          char buf[128];
          auto time = id(sntp_time).now();
          snprintf(buf, sizeof(buf), "[%02d:%02d:%02d] %s", time.hour, time.minute, time.second, log.c_str());
          vec.push_back(std::string(buf));
          if (vec.size() > 50) vec.erase(vec.begin());
          id(g_logs) = vec;
      - lvgl.textarea.update:
          id: textarea_log
          text: !lambda |-
            std::string str;
            for (auto temp : id(g_logs)) {
              str += temp;
              if (!temp.ends_with("\r\n")) str += "\r\n";
            }
            return str;
