# =================================================================
# LVGL - "Focus Drive" UI
# 레이아웃 (1280 x 720 after rotation):
#   ┌─────────────────── HEADER (72px) ───────────────────────────┐
#   │  [날짜]                [아이콘]              [시간]          │
#   ├─────────────────────────────────────────────────────────────┤
#   │  L: 연료 Arc  │  C: 속도(Hero) + RPM Arc  │  R: 운행+엔진  │
#   │    (w310)     │         (w660)             │    (w310)      │
#   │               │                            │                │
#   ├─────────────────────────────────────────────────────────────┤
#   │  BOTTOM STRIP (h=95): 실내온/습│실외온/습│외기│CO2│TVOC│탑5 │
#   └─────────────────────────────────────────────────────────────┘
# =================================================================
lvgl:
  byte_order: little_endian
  rotation: 270°
  top_layer:
    widgets:
      # ── 재시작 팝업 백드롭 ──
      - obj:
          id: obj_restart_backdrop
          hidden: true
          align: center
          width: 1280
          height: 720
          bg_color: 0x000000
          bg_opa: 50%
          border_width: 0
          radius: 0
          clickable: true

      # ── 재시작 팝업 모달 ──
      - obj:
          id: obj_restart_popup
          hidden: true
          align: center
          width: 500
          height: 280
          bg_color: 0x141C26
          border_width: 1
          border_color: 0x1E2A38
          radius: 16
          pad_all: 20
          shadow_width: 30
          shadow_color: 0x000000
          shadow_opa: 50%
          widgets:
            - label:
                text: "시스템 재시작"
                align: top_mid
                y: 10
                text_color: 0xF1C36C
                text_font: notosans30
            - label:
                text: "시스템을 재시작하시겠습니까?"
                align: center
                y: -15
                text_color: 0xFFFFFF
                text_font: notosans20
            - button:
                id: btn_restart_yes
                align: bottom_left
                x: 30
                y: -10
                width: 180
                height: 55
                bg_color: 0xC85850
                radius: 8
                border_width: 0
                on_click:
                  then:
                    - switch.turn_on: sw_restart
                widgets:
                  - label:
                      text: "예"
                      align: center
                      text_color: 0xFFFFFF
                      text_font: notosans20
            - button:
                id: btn_restart_no
                align: bottom_right
                x: -30
                y: -10
                width: 180
                height: 55
                bg_color: 0x2A3542
                radius: 8
                border_width: 0
                on_click:
                  then:
                    - lvgl.widget.hide:
                        id: obj_restart_backdrop
                    - lvgl.widget.hide:
                        id: obj_restart_popup
                widgets:
                  - label:
                      text: "아니오"
                      align: center
                      text_color: 0xFFFFFF
                      text_font: notosans20

      # ── 상단 헤더 (경고는 헤더 내부 최상단 레이어) ──
      - obj:
          id: obj_header
          hidden: true
          bg_color: 0x0D1117
          border_width: 0
          border_color: 0x1E2A38
          align: top_mid
          pad_all: 0
          width: 1280
          height: 72
          x: 0
          y: 0
          widgets:
            - button:
                id: btn_logs_toggle
                align: left_mid
                x: 8
                y: 0
                width: 68
                height: 48
                bg_opa: 0%
                border_width: 0
                pad_all: 0
                outline_width: 0
                shadow_width: 0
                shadow_opa: 0%
                on_click:
                  then:
                    - lambda: |-
                        id(g_logs_visible) = !id(g_logs_visible);
                    - if:
                        condition:
                          lambda: 'return id(g_logs_visible);'
                        then:
                          - lvgl.widget.show:
                              id: obj_log
                        else:
                          - lvgl.widget.hide:
                              id: obj_log
                widgets:
                  - obj:
                      align: left_mid
                      x: 6
                      y: 0
                      width: 14
                      height: 14
                      radius: 7
                      bg_color: 0xFF5F57
                      border_width: 0
                      pad_all: 0
                      clickable: false
                  - obj:
                      align: left_mid
                      x: 26
                      y: 0
                      width: 14
                      height: 14
                      radius: 7
                      bg_color: 0xFEBC2E
                      border_width: 0
                      pad_all: 0
                      clickable: false
                  - obj:
                      align: left_mid
                      x: 46
                      y: 0
                      width: 14
                      height: 14
                      radius: 7
                      bg_color: 0x28C840
                      border_width: 0
                      pad_all: 0
                      clickable: false
            - image:
                src: img_wifi
                id: lbl_wifi
                hidden: true
                image_recolor: 0xF1C36C
                image_recolor_opa: 100%
                align: left_mid
                x: 95
                y: 0
            - image:
                src: img_vpn
                id: lbl_vpn
                hidden: true
                image_recolor: 0xF1C36C
                image_recolor_opa: 100%
                align: left_mid
                x: 160
                y: 0
            - image:
                src: img_bluetooth
                id: lbl_bluetooth
                hidden: true
                image_recolor: 0xF1C36C
                image_recolor_opa: 100%
                align: left_mid
                x: 225
                y: 0
            - label:
                id: lbl_version
                text: "${version}"
                align: left_mid
                x: 290
                y: 0
                text_color: 0x7F8EA3
                text_font: notosans20
            - label:
                id: lbl_date
                hidden: true
                text: ""
                align: right_mid
                x: -150
                y: 0
                text_color: 0xF1C36C
                text_font: notosans30
            - label:
                id: lbl_time
                hidden: true
                text: ""
                align: right_mid
                x: -10
                y: 0
                text_color: 0xE8EEF7
                text_font: notosans45
            - button:
                id: popup_alert
                hidden: true
                align: center
                width: SIZE_CONTENT
                height: 70
                bg_color: 0xA0190F
                bg_opa: COVER
                radius: 12
                border_width: 1
                border_color: 0xFFFFFF
                border_opa: 28%
                pad_all: 8
                shadow_width: 12
                shadow_offset_x: 0
                shadow_offset_y: 5
                shadow_spread: 0
                shadow_color: 0x000000
                shadow_opa: 38%
                outline_width: 0
                pressed:
                  shadow_width: 4
                  shadow_offset_y: 2
                  border_opa: 18%
                on_click:
                  then:
                    - lambda: |-
                        id(alert_dismissed) = true;
                        id(script_logs).execute("ALERT: Dismissed");
                    - lvgl.widget.hide:
                        id: popup_alert
                widgets:
                  - label:
                      id: lbl_alert_msg
                      text: ""
                      align: center
                      text_color: 0xFFFFFF
                      text_font: notosans30

      # ── 부팅 스플래시 (obj_splash_content: 페이드 + 스피너) ──
      - obj:
          id: obj_splash
          bg_color: 0x0B0F14
          border_width: 0
          pad_all: 0
          align: center
          width: 1280
          height: 720
          widgets:
