substitutions:
  name: "esp-colorado-tab5"
  friendly_name: "ESP Colorado TAB5"
  version: "v260525 rev.2"
  number: "82머 5979"
  mac_vlinker: "C0:25:E8:53:2C:90"
  mac_cabin_jht: "DA:E8:DD:E2:9A:47"
  mac_bed_jht: "F5:A8:DB:76:1A:F5"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  on_boot:
    - script.execute:
        id: script_logs
        log: ${version}
    - script.execute:
        id: script_splash_fade_in
    - lvgl.label.update:
        id: lbl_splash_status
        text: "Initializing systems..."
    - lvgl.bar.update:
        id: bar_splash_progress
        value: 15
    - delay: 1500ms
    - lvgl.label.update:
        id: lbl_splash_status
        text: "Connecting network..."
    - lvgl.bar.update:
        id: bar_splash_progress
        value: 45
    - delay: 1500ms
    - lvgl.label.update:
        id: lbl_splash_status
        text: "Loading dashboard..."
    - lvgl.bar.update:
        id: bar_splash_progress
        value: 80
    - delay: 900ms
    - lvgl.label.update:
        id: lbl_splash_status
        text: "Ready"
    - lvgl.bar.update:
        id: bar_splash_progress
        value: 100
    - delay: 500ms
    - script.execute:
        id: script_splash_fade_out
    - lvgl.widget.hide:
        id: obj_splash
    - lvgl.widget.show:
        id: obj_header
    - lvgl.page.show:
        id: main_page
        animation: FADE_IN
        time: 500ms
    - light.turn_on:
        id: backlight
        brightness: 40%

logger:
  level: DEBUG

ota:
  platform: esphome
  password: !secret ota_password

time:
  - platform: sntp
    id: sntp_time
    timezone: Asia/Seoul
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org
    on_time_sync:
      then:
        - lvgl.widget.show:
            id: lbl_date
        - lvgl.widget.show:
            id: lbl_time
        - lambda: id(script_logs).execute("NTP Time Synced");

esp32:
  board: esp32-p4-evboard
  cpu_frequency: 360MHz
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true


