interval:
  # ── 경고 팝업 제어 (1초 주기)
  - interval: 1s
    then:
      - lambda: |-
          bool a = false;
          std::string msg = "";
          uint32_t color_hex = 0x8A5500;
          
          if (!isnan(id(car_speed).state) && id(car_speed).state > 110) { msg = "과속 주의!"; a = true; color_hex = 0xA0190F; }
          else if (!isnan(id(id_scd40_co2).state) && id(id_scd40_co2).state > 2500) { msg = "졸음 경고!"; a = true; color_hex = 0xA0190F; }
          else if (!isnan(id(id_scd40_co2).state) && id(id_scd40_co2).state > 1500) { msg = "졸음 주의!"; a = true; color_hex = 0x8A5500; }
          else if (!isnan(id(id_sgp30_tvoc).state) && id(id_sgp30_tvoc).state > 5000) { msg = "가스 주의!"; a = true; color_hex = 0x8A5500; }
          else if (!isnan(id(id_sgp30_tvoc).state) && id(id_sgp30_tvoc).state > 3333) { msg = "환기 필요!"; a = true; color_hex = 0x8A5500; }
          else if (!isnan(id(car_acceleration).state) && id(car_acceleration).state > 9.0) { msg = "급가속!"; a = true; color_hex = 0xA0190F; }
          else if (!isnan(id(car_acceleration).state) && id(car_acceleration).state < -9.0) { msg = "급감속!"; a = true; color_hex = 0xA0190F; }
          else if (!isnan(id(engine_load).state) && id(engine_load).state > 95) { msg = "엔진 과부하!"; a = true; color_hex = 0x8A5500; }
          else if (!isnan(id(id_tab5_internal_temperature).state) && id(id_tab5_internal_temperature).state > 70) { msg = "장치 과열!"; a = true; color_hex = 0xA0190F; }
          else if (!isnan(id(fuel_level).state) && id(fuel_level).state < 10) { msg = "주유 필요!"; a = true; color_hex = 0x8A5500; }
          else if (id(parking_info).has_state() && id(parking_info).state.length() > 0 && id(parking_info).state != "unknown" && id(parking_info).state != "off") {
            msg = id(parking_info).state;
            a = true;
            color_hex = 0x2864C8;
          }
          
          id(alert_active) = a;
          if (!a) id(alert_dismissed) = false;
          
          id(g_alert_msg) = msg;
          id(g_alert_color) = color_hex;
          
          static std::string last_logged_msg = "";
          if (msg != last_logged_msg) {
            if (!msg.empty()) {
              id(script_logs).execute("ALERT: " + msg);
            } else {
              id(script_logs).execute("ALERT: Cleared");
            }
            last_logged_msg = msg;
          }
      - if:
          condition:
            lambda: 'return id(alert_active) && !id(alert_dismissed);'
          then:
            - lvgl.widget.show:
                id: popup_alert
            - lvgl.label.update:
                id: lbl_alert_msg
                text: !lambda 'return id(g_alert_msg);'
            - lvgl.widget.update:
                id: popup_alert
                bg_color: !lambda 'return lv_color_hex(id(g_alert_color));'
      - if:
          condition:
            lambda: 'return !id(alert_active) || id(alert_dismissed);'
          then:
            - lvgl.widget.hide:
                id: popup_alert


text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP"
      icon: mdi:ip-outline
  - platform: template
    name: "Time"
    internal: True
    update_interval: 1s
    lambda: |-
      char buf[20];
      auto time = id(sntp_time).now();
      sprintf(buf, "%02d:%02d", time.hour, time.minute);
      return std::string(buf);
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_time
            text: !lambda return x;
  - platform: template
    name: "Date"
    internal: True
    update_interval: 1s
    lambda: |-
      char buf[20];
      auto time = id(sntp_time).now();
      int weekday = time.day_of_week - 1;
      const char* weekdays[] = {"일", "월", "화", "수", "목", "금", "토"};
      sprintf(buf, "%02d월 %02d일 (%s)", time.month, time.day_of_month, weekdays[weekday]);
      return std::string(buf);
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_date
            text: !lambda return x;
  - platform: template
    name: "Manufacturer Data"
    id: manufacturer_data
    icon: "mdi:package-variant-closed"
    internal: True
  - platform: template
    name: "Parking Info"
    id: parking_info
    icon: "mdi:car"
    on_value:
      then:
        - lambda: |-
            if (x.length() > 0 && x != "unknown" && x != "off") {
              id(alert_dismissed) = false;
            }
  - platform: template
    name: "Template Engine Run Time"
    internal: True
    update_interval: 1s
    lambda: |-
      if (isnan(id(engine_run_time).state)) return std::string("--:--");
      char buf[20];
      int seconds = (int)id(engine_run_time).state;
      int minutes = seconds / 60;
      int hours = minutes / 60;
      if (hours > 0) sprintf(buf, "%d:%02d:%02d", hours, minutes % 60, seconds % 60);
      else sprintf(buf, "%02d:%02d", minutes, seconds % 60);
      return std::string(buf);
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_engine_run_time
            text: !lambda return x;
            text_color: !lambda return id(fn_state_color)(id(engine_run_time).state, 11);
        - lvgl.widget.update:
            id: widget_img_timer
            image_recolor: !lambda return id(fn_state_color)(id(engine_run_time).state, 11);

