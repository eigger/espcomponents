                    - button:
                        id: btn_pitch
                        align: left_mid
                        x: 0
                        y: 0
                        width: 290
                        height: 95
                        bg_color: 0x141C26
                        radius: 12
                        border_width: 1
                        border_color: 0x1E2A38
                        pad_all: 0
                        outline_width: 0
                        shadow_width: 0
                        shadow_opa: 0%
                        on_click:
                          then:
                            - lambda: |-
                                if (std::abs(id(g_pitch_offset)) > 0.0001f) {
                                  id(g_pitch_offset) = 0.0f;
                                  id(script_logs).execute("Pitch calibration cleared");
                                } else {
                                  float v = id(id_device_pitch).state;
                                  if (!isnan(v)) {
                                    id(g_pitch_offset) = v;
                                    char buf[64];
                                    snprintf(buf, sizeof(buf), "Pitch calibrated to %+.1f°", v);
                                    id(script_logs).execute(buf);
                                  }
                                }
                            - lvgl.widget.show:
                                id: obj_restart_backdrop
                            - lvgl.widget.show:
                                id: obj_restart_popup
