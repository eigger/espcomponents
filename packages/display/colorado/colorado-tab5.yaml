mqtt:
  broker: !secret mqtt_broker_local
  username: !secret mqtt_user
  password: !secret mqtt_password
  reboot_timeout: 0s
  
  birth_message:
  will_message:

# api:
#   batch_delay: 1s
#   reboot_timeout: 0s

esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

wifi:
  networks:
    - ssid: !secret colorado_wifi_ssid
      password: !secret colorado_wifi_password
      priority: 10
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      priority: 5

  reboot_timeout: 0s
  use_address: !secret colorado_wg_address
  fast_connect: true
  on_connect:
    then:
      - lambda: id(script_logs).execute("Wifi Connected");
      - lvgl.widget.show:
          id: lbl_wifi
  on_disconnect:
    then:
      - lambda: id(script_logs).execute("Wifi Disconnected");
      - lvgl.widget.hide:
          id: lbl_wifi

wireguard:
  address: !secret colorado_wg_address
  private_key: !secret colorado_wg_private_key
  peer_endpoint: !secret wg_peer_endpoint
  peer_public_key: !secret colorado_wg_peer_public_key
  peer_allowed_ips:
    - 192.168.0.0/16
  netmask: 255.255.0.0

external_components:
  - source: github://eigger/espcomponents@latest
    components: [ jaalee_jht, ble_elm327, bmi270 ]
    refresh: always

esp32_ble_tracker:
  on_ble_manufacturer_data_advertise:
    - manufacturer_id: 035D
      then:
        - lambda: |-
            std::string hex_string;
            for (auto b : x) {
              char buf[4];
              sprintf(buf, "%02X ", b);
              hex_string += buf;
            }
            id(script_logs).execute(hex_string);
            id(manufacturer_data).publish_state(hex_string);
            if (x.size() != 14) return;
            char buf[20];
            sprintf(buf, "%02d-%02d %02d:%02d B%d %c%c", x[7], x[8], x[9], x[10], 0xFF - x[11] + 1, x[12], x[13]);
            std::string info = std::string(buf);
            id(parking_info).publish_state(info);

ble_client:
  - mac_address: ${mac_vlinker}
    id: obd_client
    on_connect:
      then:
        - lvgl.widget.show:
            id: lbl_bluetooth
        - lambda: id(script_logs).execute("OBD BLE Connected");
    on_disconnect:
      then:
        - lvgl.widget.hide:
            id: lbl_bluetooth
        - lambda: id(script_logs).execute("OBD BLE Disconnected");

ble_elm327:
  id: obd_elm
  ble_client_id: obd_client
  service_uuid: "18F0"
  rx_char_uuid: "2AF0"
  tx_char_uuid: "2AF1"
  init_commands:
    - "ATZ"
    - "ATE0"
    - "ATL0"
    - "ATS0"
    - "ATH0"
    - "ATSP6"
  tx_delay: 50

psram:
  mode: hex
  speed: 200MHz

i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz
    scan: false
  - id: ext_bus
    sda: GPIO53
    scl: GPIO54
    scan: false

pi4ioe5v6408:
  - id: pi4ioe1
    i2c_id: bsp_bus
    address: 0x43
  - id: pi4ioe2
    i2c_id: bsp_bus
    address: 0x44

globals:
  - id: alert_dismissed
    type: bool
    initial_value: 'false'
  - id: alert_active
    type: bool
    initial_value: 'false'
  - id: g_logs
    type: std::vector<std::string>
    restore_value: no
    initial_value: ''
  - id: g_alert_msg
    type: std::string
    initial_value: '""'
  - id: g_alert_color
    type: uint32_t
    initial_value: '0'
  - id: g_initial_odometer
    type: float
    initial_value: '-1.0'
  - id: g_roll_offset
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: g_pitch_offset
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: g_logs_visible
    type: bool
    initial_value: 'false'
  # ── 텍스트 색상 함수 (버그 수정: mode 8/10 분리)
  - id: fn_state_color
    type: "std::function<lv_color_t(float, int)>"
    initial_value: |-
      [](float val, int mode) -> lv_color_t {
         lv_color_t c_gray   = lv_color_hex(0x7F8EA3);
         // 대시보드 톤(회청·골드 악센트)에 맞춘 뮤트 팔레트 — 순색 피함
         lv_color_t c_blue   = lv_color_hex(0x7A9DB8);
         lv_color_t c_white  = lv_color_hex(0xFFFFFF);
         lv_color_t c_yellow = lv_color_hex(0xF1C36C);
         lv_color_t c_red    = lv_color_hex(0xC85850);
         lv_color_t c_orange = lv_color_hex(0xD9A060);

         if (isnan(val)) return c_gray;

         if (mode == 1 || mode == 2) { // 일반/실내 온도
           if (val < 5)  return c_blue;
           else if (val < 70) return c_white;
           else if (val < 95) return c_yellow;
           return c_red;
         } else if (mode == 3) { // 습도
           if (val < 30) return c_yellow;
           else if (val < 70) return c_white;
           return c_blue;
         } else if (mode == 5) { // 냉각수 / 미션 오일
           if (val < 60)  return c_blue;
           else if (val < 95) return c_white;
           else if (val < 110) return c_yellow;
           return c_red;
         } else if (mode == 6) { // 연료 (정상=골드, 예전 아크 F1C36C 와 통일)
           if (val > 30) return c_yellow;
           else if (val > 15) return c_orange;
           return c_red;
         } else if (mode == 7) { // 배터리
           if (val < 12.0) return c_red;
           else if (val < 12.5) return c_yellow;
           else if (val < 14.8) return c_white;
           return c_red;
         } else if (mode == 8) { // RPM
           if (val > 3500) return c_red;
           else if (val > 2500) return c_orange;
           return c_yellow;
         } else if (mode == 9) { // 엔진 부하 %
           if (val > 95) return c_red;
           else if (val > 75) return c_orange;
           return c_yellow;
         } else if (mode == 10) { // Speed (분리 수정)
           if (val > 120) return c_red;
           else if (val > 100) return c_yellow;
           return c_white;
         } else if (mode == 11) { // 운행시간 (초): 10분 미만 파랑, 10분~1시간 흰, 1~2시간 주황, 2시간+ 빨강
           if (val < 600) return c_blue;
           if (val < 3600) return c_white;
           if (val < 7200) return c_orange;
           return c_red;
         } else if (mode == 12) { // TVOC
           if (val > 3333) return c_red;
           else if (val > 1000) return c_yellow;
           return c_white;
         } else if (mode == 13) { // CO2
           if (val > 2000) return c_red;
           else if (val > 1000) return c_yellow;
           return c_white;
         }
         return c_white;
      }
switch:
  - platform: restart
    name: "Restart"
    id: sw_restart
  - platform: safe_mode
    name: "Restart Safemode"
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON
    internal: True
  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3
    internal: True
  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true
    internal: True
  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7
    restore_mode: ALWAYS_OFF
    internal: True
  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0
    internal: True
  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_OFF
    internal: True
  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2
    restore_mode: ALWAYS_ON
    internal: True

binary_sensor:
  # - platform: status
  #   name: "Status"
  - platform: wireguard
    status:
      internal: True
      name: 'WireGuard Status'
      on_press:
        then:
          - lambda: id(script_logs).execute("VPN Connected");
          - lvgl.widget.show:
              id: lbl_vpn
      on_release:
        then:
          - lambda: id(script_logs).execute("VPN Disconnected");
          - lvgl.widget.hide:
              id: lbl_vpn

  - platform: gpio
    id: charging
    name: "Charging Status"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 6
      mode: INPUT_PULLDOWN
    internal: True
  - platform: gpio
    id: headphone_detect
    name: "Headphone Detect"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 7
    internal: True

select:
  - platform: template
    id: wifi_antenna_select
    name: "WiFi Antenna"
    options:
      - "Internal"
      - "External"
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: return i == 0;
          then:
            - switch.turn_off: wifi_antenna_int_ext
          else:
            - switch.turn_on: wifi_antenna_int_ext
    internal: True

sensor:
  - platform: wifi_signal
    name: "WiFi signal"
    icon: mdi:wifi-arrow-up-down
    update_interval: 60s
    internal: true
    id: wifi_sig
    filters:
      - sliding_window_moving_average:
          window_size: 15
          send_every: 15
  - platform: template
    name: "WiFi Quality"
    icon: "mdi:wifi"
    update_interval: 60s
    unit_of_measurement: '%'
    entity_category: "diagnostic"
    state_class: measurement
    accuracy_decimals: 0
    lambda: !lambda |-
      float dBm = id(wifi_sig).state;
      if (isnan(dBm)) return -1;
      if (dBm <= -100) return 0;
      if (dBm >= -50) return 100;
      return round(2 * (dBm + 100));
  - platform: ina226
    i2c_id: bsp_bus
    address: 0x41
    adc_averaging: 16
    max_current: 8.192A
    shunt_resistance: 0.005ohm
    bus_voltage:
      name: Battery Voltage
      internal: True
    current:
      name: Battery Current
      internal: True
  - platform: internal_temperature
    name: "Internal Temperature"
    id: "id_tab5_internal_temperature"
    update_interval: 5min
    filters:
      - filter_out: nan
      - heartbeat: 15s
      - sliding_window_moving_average:
          window_size: 30
          send_every: 1
          send_first_at: 1
  - platform: jaalee_jht
    mac_address: ${mac_cabin_jht}
    temperature:
      id: "id_cabin_temperature"
      name: "Cabin Temperature"
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_cabin_temperature
              text: !lambda |-
                if (isnan(x)) return std::string("--");
                char buf[10]; snprintf(buf, sizeof(buf), "%.1f", x); return std::string(buf);
              text_color: !lambda return id(fn_state_color)(x, 2);
    humidity:
      id: "id_cabin_humidity"
      name: "Cabin Humidity"
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_cabin_humidity
              text: !lambda |-
                if (isnan(x)) return std::string("--");
                char buf[10]; snprintf(buf, sizeof(buf), "%.1f", x); return std::string(buf);
              text_color: !lambda return id(fn_state_color)(x, 3);
    battery_level:
      id: "id_cabin_battery_level"
      name: "Cabin Battery Level"
      internal: true
  - platform: jaalee_jht
    mac_address: ${mac_bed_jht}
    temperature:
      id: "id_bed_temperature"
      name: "Bed Temperature"
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_bed_temperature
              text: !lambda |-
                if (isnan(x)) return std::string("--");
                char buf[10]; snprintf(buf, sizeof(buf), "%.1f", x); return std::string(buf);
              text_color: !lambda return id(fn_state_color)(x, 2);
    humidity:
      id: "id_bed_humidity"
      name: "Bed Humidity"
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_bed_humidity
              text: !lambda |-
                if (isnan(x)) return std::string("--");
                char buf[10]; snprintf(buf, sizeof(buf), "%.1f", x); return std::string(buf);
              text_color: !lambda return id(fn_state_color)(x, 3);
    battery_level:
      id: "id_bed_battery_level"
      name: "Bed Battery Level"
      internal: true
  - platform: ble_elm327
    id: "engine_run_time"
    name: "Engine Run Time"
    preset: run_time
    update_interval: 5s
  - platform: ble_elm327
    id: "engine_coolant_temperature"
    name: "Engine Coolant Temperature"
    preset: coolant_temp
    update_interval: 10s
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_engine_coolant_temperature
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.0f", x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 5);
        - lvgl.widget.update:
            id: widget_img_coolant
            image_recolor: !lambda return id(fn_state_color)(x, 5);
  - platform: ble_elm327
    id: "fuel_level"
    name: "Fuel Level"
    preset: fuel_level
    update_interval: 30s
    filters:
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1
      - delta: 0.5
      - throttle: 60s
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_fuel_level
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.0f", x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 6);
        - lvgl.bar.update:
            id: bar_fuel
            value: !lambda return (int)x;
        - lvgl.widget.update:
            id: bar_fuel
            indicator:
              bg_color: !lambda return id(fn_state_color)(x, 6);
        - lvgl.widget.update:
            id: widget_img_fuel
            image_recolor: !lambda return id(fn_state_color)(x, 6);
  - platform: ble_elm327
    id: "throttle"
    name: "Throttle Position"
    preset: throttle
    update_interval: 1s
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_throttle
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.0f", x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 9);
        - lvgl.bar.update:
            id: bar_throttle
            value: !lambda return (int)x;
        - lvgl.widget.update:
            id: bar_throttle
            indicator:
              bg_color: !lambda return id(fn_state_color)(x, 9);
        - lvgl.widget.update:
            id: widget_img_throttle
            image_recolor: !lambda return id(fn_state_color)(x, 9);
  - platform: ble_elm327
    id: "intake_air_temperature"
    name: "Intake Air Temperature"
    preset: intake_air_temp
    update_interval: 10s
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_intake_temp_display
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.0f", x); return std::string(buf);
            text_color: 0xF7FBFF
  - platform: ble_elm327
    id: "ambient_air_temperature"
    name: "Ambient Air Temperature"
    preset: ambient_temp
    update_interval: 30s
  - platform: ble_elm327
    id: "car_battery"
    name: "Car Battery"
    preset: battery_voltage
    update_interval: 10s
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_car_battery
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.1f", x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 7);
        - lvgl.widget.update:
            id: widget_img_battery
            image_recolor: !lambda return id(fn_state_color)(x, 7);
  - platform: ble_elm327
    id: "engine_rpm"
    name: "Engine RPM"
    preset: rpm
    update_interval: 1s
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_engine_rpm
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.0f", x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 8);
        - lvgl.arc.update:
            id: arc_rpm
            value: !lambda return (int)x;
        - lvgl.widget.update:
            id: arc_rpm
            indicator:
              arc_color: !lambda return id(fn_state_color)(x, 8);
              arc_width: 10
  - platform: ble_elm327
    id: "engine_load"
    name: "Engine Load"
    preset: engine_load
    update_interval: 1s
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_engine_load_left
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.0f", x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 9);
        - lvgl.bar.update:
            id: bar_engine_load
            value: !lambda return (int)x;
        - lvgl.widget.update:
            id: bar_engine_load
            indicator:
              bg_color: !lambda return id(fn_state_color)(x, 9);
        - lvgl.widget.update:
            id: widget_img_load
            image_recolor: !lambda return id(fn_state_color)(x, 9);
  - platform: ble_elm327
    id: "car_speed"
    name: "Car Speed"
    preset: speed
    update_interval: 1s
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_speed
            text: !lambda |-
              if (isnan(x)) return std::string("0");
              char buf[10]; snprintf(buf, sizeof(buf), "%d", (int)x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 10);
        - lambda: |-
            if (!isnan(x)) {
              static float old_speed = 0.0f;
              static unsigned long timer = millis();
              if (millis() - timer > 1000) {
                id(car_acceleration).publish_state(x - old_speed);
                old_speed = x;
                timer = millis();
              }
            }

  - platform: template
    id: "car_acceleration"
    name: "Car Acceleration"
    icon: mdi:speedometer
    state_class: "measurement"
    unit_of_measurement: km/h/s
    update_interval: never

  - platform: ble_elm327
    id: "odometer"
    name: "Odometer"
    preset: odometer
    update_interval: 60s
    on_value:
      then:
        - lambda: |-
            if (!isnan(x) && x > 0) {
              if (id(g_initial_odometer) < 0) {
                id(g_initial_odometer) = x;
              }
              float trip = x - id(g_initial_odometer);
              id(trip_distance).publish_state(trip);
            }
  - platform: template
    id: "trip_distance"
