esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  on_boot:
    - script.execute:
        id: script_logs
        log: ${version}
    - script.execute:
        id: script_splash_fade_in
    - lvgl.label.update:
        id: lbl_splash_status
        text: "Initializing systems..."
    - lvgl.bar.update:
        id: bar_splash_progress
        value: 15
    - delay: 1500ms
    - lvgl.label.update:
        id: lbl_splash_status
        text: "Connecting network..."
    - lvgl.bar.update:
        id: bar_splash_progress
        value: 45
    - delay: 1500ms
    - lvgl.label.update:
        id: lbl_splash_status
        text: "Loading dashboard..."
    - lvgl.bar.update:
        id: bar_splash_progress
        value: 80
    - delay: 900ms
    - lvgl.label.update:
        id: lbl_splash_status
        text: "Ready"
    - lvgl.bar.update:
        id: bar_splash_progress
        value: 100
    - delay: 500ms
    - script.execute:
        id: script_splash_fade_out
    - lvgl.widget.hide:
        id: obj_splash
    - lvgl.widget.show:
        id: obj_header
    - lvgl.page.show:
        id: main_page
        animation: FADE_IN
        time: 500ms
    - lvgl.label.update:
        id: lbl_number
        text: ${number}
    - lvgl.label.update:
        id: lbl_version
        text: ${version}
    - light.turn_on:
        id: backlight
        brightness: 40%

logger:
  level: NONE

ota:
  platform: esphome
  password: !secret ota_password

time:
  - platform: sntp
    id: sntp_time
    timezone: Asia/Seoul
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org
    on_time_sync:
      then:
        - lvgl.widget.show:
            id: lbl_date
        - lvgl.widget.show:
            id: lbl_time

esp32:
  board: esp32-p4-evboard
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

api:
  batch_delay: 1s
  reboot_timeout: 0s

esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

wifi:
  ssid: !secret colorado_wifi_ssid
  password: !secret colorado_wifi_password
  reboot_timeout: 0s
  use_address: !secret colorado_wg_address
  fast_connect: true
  on_connect:
    then:
      - lambda: id(script_logs).execute("Wifi Connected");
      - lvgl.widget.show:
          id: lbl_wifi
  on_disconnect:
    then:
      - lambda: id(script_logs).execute("Wifi Disconnected");
      - lvgl.widget.hide:
          id: lbl_wifi

wireguard:
  address: !secret colorado_wg_address
  private_key: !secret colorado_wg_private_key
  peer_endpoint: !secret wg_peer_endpoint
  peer_public_key: !secret colorado_wg_peer_public_key
  peer_allowed_ips:
    - 192.168.0.0/16
  netmask: 255.255.0.0

external_components:
  - source: github://eigger/espcomponents@latest
    components: [ jaalee_jht ]
    refresh: 1h

esp32_ble_tracker:
  on_ble_manufacturer_data_advertise:
    - manufacturer_id: 035D
      then:
        - lambda: |-
            std::string hex_string;
            for (auto b : x) {
              char buf[4];
              sprintf(buf, "%02X ", b);
              hex_string += buf;
            }
            id(script_logs).execute(hex_string);
            id(manufacturer_data).publish_state(hex_string);
            if (x.size() != 14) return;
            char buf[20];
            sprintf(buf, "%02d-%02d %02d:%02d B%d %c%c", x[7], x[8], x[9], x[10], 0xFF - x[11] + 1, x[12], x[13]);
            std::string info = std::string(buf);
            id(parking_info).publish_state(info);

ble_client:
  - mac_address: ${mac_vlinker}
    id: vlinker
    name: vLinker
    on_connect:
      then:
        - lvgl.widget.show:
            id: lbl_bluetooth
        - lambda: id(script_ble_write).execute("ATZ");
        - delay: 100ms
        - lambda: id(script_ble_write).execute("ATE0");
        - delay: 100ms
        - lambda: id(script_ble_write).execute("ATL0");
        - delay: 100ms
        - lambda: id(script_ble_write).execute("ATS0");
        - delay: 100ms
        - lambda: id(script_ble_write).execute("ATH0");
        - delay: 100ms
        - lambda: id(script_ble_write).execute("ATSP6");
        - delay: 100ms
        - lambda: id(odb_init) = true;
    on_disconnect:
      then:
        - lambda: id(odb_init) = false;
        - lvgl.widget.hide:
            id: lbl_bluetooth

psram:
  mode: hex
  speed: 200MHz

i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz
  - id: ext_bus
    sda: GPIO53
    scl: GPIO54

pi4ioe5v6408:
  - id: pi4ioe1
    i2c_id: bsp_bus
    address: 0x43
  - id: pi4ioe2
    i2c_id: bsp_bus
    address: 0x44

globals:
  - id: odb_init
    type: bool
    initial_value: 'false'
  - id: obd_cmd_index
    type: int
    initial_value: '0'
  - id: alert_dismissed
    type: bool
    initial_value: 'false'
  - id: alert_active
    type: bool
    initial_value: 'false'
  - id: g_logs
    type: std::vector<std::string>
    restore_value: no
    initial_value: ''
  # ── 텍스트 색상 함수 (버그 수정: mode 8/10 분리)
  - id: fn_state_color
    type: "std::function<lv_color_t(float, int)>"
    initial_value: |-
      [](float val, int mode) -> lv_color_t {
         lv_color_t c_gray   = lv_color_hex(0x7F8EA3);
         // 대시보드 톤(회청·골드 악센트)에 맞춘 뮤트 팔레트 — 순색 피함
         lv_color_t c_blue   = lv_color_hex(0x7A9DB8);
         lv_color_t c_white  = lv_color_hex(0xFFFFFF);
         lv_color_t c_yellow = lv_color_hex(0xF1C36C);
         lv_color_t c_red    = lv_color_hex(0xC85850);
         lv_color_t c_orange = lv_color_hex(0xD9A060);

         if (isnan(val)) return c_gray;

         if (mode == 1 || mode == 2) { // 일반/실내 온도
           if (val < 5)  return c_blue;
           else if (val < 70) return c_white;
           else if (val < 95) return c_yellow;
           return c_red;
         } else if (mode == 3) { // 습도
           if (val < 30) return c_yellow;
           else if (val < 70) return c_white;
           return c_blue;
         } else if (mode == 5) { // 냉각수
           if (val < 60)  return c_blue;
           else if (val < 95) return c_white;
           else if (val < 110) return c_yellow;
           return c_red;
         } else if (mode == 6) { // 연료 (정상=골드, 예전 아크 F1C36C 와 통일)
           if (val > 30) return c_yellow;
           else if (val > 15) return c_orange;
           return c_red;
         } else if (mode == 7) { // 배터리
           if (val < 12.0) return c_red;
           else if (val < 12.5) return c_yellow;
           else if (val < 14.8) return c_white;
           return c_red;
         } else if (mode == 8) { // RPM
           if (val > 3500) return c_red;
           else if (val > 2500) return c_orange;
           return c_yellow;
         } else if (mode == 9) { // 엔진 부하 %
           if (val > 95) return c_red;
           else if (val > 75) return c_orange;
           return c_yellow;
         } else if (mode == 10) { // Speed (분리 수정)
           if (val > 120) return c_red;
           else if (val > 100) return c_yellow;
           return c_white;
         } else if (mode == 11) { // 운행시간 (초): 10분 미만 파랑, 10분~1시간 흰, 1~2시간 주황, 2시간+ 빨강
           if (val < 600) return c_blue;
           if (val < 3600) return c_white;
           if (val < 7200) return c_orange;
           return c_red;
         } else if (mode == 12) { // TVOC
           if (val > 3333) return c_red;
           else if (val > 1000) return c_yellow;
           return c_white;
         } else if (mode == 13) { // CO2
           if (val > 2000) return c_red;
           else if (val > 1000) return c_yellow;
           return c_white;
         }
         return c_white;
      }
switch:
  - platform: restart
    name: "Restart"
  - platform: safe_mode
    name: "Restart Safemode"
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3
  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true
  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7
    restore_mode: ALWAYS_OFF
  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0
  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_OFF
  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2
    restore_mode: ALWAYS_ON

binary_sensor:
  - platform: status
    name: "Status"
  - platform: wireguard
    status:
      name: 'WireGuard Status'
      on_press:
        then:
          - lambda: id(script_logs).execute("VPN Connected");
          - lvgl.widget.show:
              id: lbl_vpn
      on_release:
        then:
          - lambda: id(script_logs).execute("VPN Disconnected");
          - lvgl.widget.hide:
              id: lbl_vpn
  - platform: gpio
    id: charging
    name: "Charging Status"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 6
      mode: INPUT_PULLDOWN
  - platform: gpio
    id: headphone_detect
    name: "Headphone Detect"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 7

select:
  - platform: template
    id: wifi_antenna_select
    name: "WiFi Antenna"
    options:
      - "Internal"
      - "External"
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: return i == 0;
          then:
            - switch.turn_off: wifi_antenna_int_ext
          else:
            - switch.turn_on: wifi_antenna_int_ext

sensor:
  - platform: uptime
    name: "Uptime"
    type: timestamp
  - platform: wifi_signal
    name: "WiFi signal"
    icon: mdi:wifi-arrow-up-down
    update_interval: 60s
    internal: true
    id: wifi_sig
    filters:
      - sliding_window_moving_average:
          window_size: 15
          send_every: 15
  - platform: template
    name: "WiFi Quality"
    icon: "mdi:wifi"
    update_interval: 60s
    unit_of_measurement: '%'
    entity_category: "diagnostic"
    state_class: measurement
    accuracy_decimals: 0
    lambda: !lambda |-
      float dBm = id(wifi_sig).state;
      if (isnan(dBm)) return -1;
      if (dBm <= -100) return 0;
      if (dBm >= -50) return 100;
      return round(2 * (dBm + 100));
  - platform: ina226
    i2c_id: bsp_bus
    address: 0x41
    adc_averaging: 16
    max_current: 8.192A
    shunt_resistance: 0.005ohm
    bus_voltage:
      name: Battery Voltage
    current:
      name: Battery Current
  - platform: internal_temperature
    name: "Internal Temperature"
    id: "id_tab5_internal_temperature"
    update_interval: 5min
    filters:
      - filter_out: nan
      - heartbeat: 15s
      - sliding_window_moving_average:
          window_size: 30
          send_every: 1
          send_first_at: 1
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tab5_temperature
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.1f", x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 1);
  - platform: jaalee_jht
    mac_address: ${mac_cabin_jht}
    temperature:
      id: "id_cabin_temperature"
      name: "Cabin Temperature"
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_cabin_temperature
              text: !lambda |-
                if (isnan(x)) return std::string("--");
                char buf[10]; snprintf(buf, sizeof(buf), "%.1f", x); return std::string(buf);
              text_color: !lambda return id(fn_state_color)(x, 2);
    humidity:
      id: "id_cabin_humidity"
      name: "Cabin Humidity"
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_cabin_humidity
              text: !lambda |-
                if (isnan(x)) return std::string("--");
                char buf[10]; snprintf(buf, sizeof(buf), "%.1f", x); return std::string(buf);
              text_color: !lambda return id(fn_state_color)(x, 3);
    battery_level:
      id: "id_cabin_battery_level"
      name: "Cabin Battery Level"
      internal: true
  - platform: jaalee_jht
    mac_address: ${mac_bed_jht}
    temperature:
      id: "id_bed_temperature"
      name: "Bed Temperature"
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_bed_temperature
              text: !lambda |-
                if (isnan(x)) return std::string("--");
                char buf[10]; snprintf(buf, sizeof(buf), "%.1f", x); return std::string(buf);
              text_color: !lambda return id(fn_state_color)(x, 2);
    humidity:
      id: "id_bed_humidity"
      name: "Bed Humidity"
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_bed_humidity
              text: !lambda |-
                if (isnan(x)) return std::string("--");
                char buf[10]; snprintf(buf, sizeof(buf), "%.1f", x); return std::string(buf);
              text_color: !lambda return id(fn_state_color)(x, 3);
    battery_level:
      id: "id_bed_battery_level"
      name: "Bed Battery Level"
      internal: true
  - platform: template
    id: "engine_run_time"
    name: "Engine Run Time"
    icon: mdi:clock-outline
    state_class: "measurement"
    unit_of_measurement: "sec"
    accuracy_decimals: 0
    update_interval: never
  - platform: template
    id: "engine_coolant_temperature"
    name: "Engine Coolant Temperature"
    icon: mdi:coolant-temperature
    state_class: "measurement"
    device_class: "temperature"
    update_interval: never
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_engine_coolant_temperature
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.0f", x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 5);
  - platform: template
    id: "fuel_level"
    name: "Fuel Level"
    icon: mdi:gas-station
    state_class: "measurement"
    unit_of_measurement: "%"
    update_interval: never
    filters:
      - median:
          window_size: 11
          send_every: 5
          send_first_at: 1
      - exponential_moving_average:
          alpha: 0.1
          send_every: 1
      - delta: 0.5
      - throttle: 5min
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_fuel_level
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.0f", x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 6);
        - lvgl.arc.update:
            id: arc_fuel
            value: !lambda return (int)x;
        - lvgl.widget.update:
            id: arc_fuel
            indicator:
              arc_color: !lambda return id(fn_state_color)(x, 6);
              arc_width: 12
  - platform: template
    id: "ambient_air_temperature"
    name: "Ambient Air Temperature"
    icon: mdi:thermometer
    state_class: "measurement"
    device_class: "temperature"
    update_interval: never
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_ambient_air_temperature
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.1f", x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 2);
  - platform: template
    id: "car_battery"
    name: "Car Battery"
    icon: mdi:car-battery
    state_class: "measurement"
    device_class: "voltage"
    update_interval: never
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_car_battery
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.1f", x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 7);
  - platform: template
    id: "engine_rpm"
    name: "Engine RPM"
    icon: mdi:cog-clockwise
    state_class: "measurement"
    unit_of_measurement: rpm
    update_interval: never
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_engine_rpm
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.0f", x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 8);
        - lvgl.arc.update:
            id: arc_rpm
            value: !lambda return (int)x;
        - lvgl.widget.update:
            id: arc_rpm
            indicator:
              arc_color: !lambda return id(fn_state_color)(x, 8);
              arc_width: 10
  - platform: template
    id: "engine_load"
    name: "Engine Load"
    icon: mdi:engine
    state_class: "measurement"
    unit_of_measurement: "%"
    update_interval: never
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_engine_load_left
            text: !lambda |-
              if (isnan(x)) return std::string("--");
              char buf[10]; snprintf(buf, sizeof(buf), "%.0f", x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 9);
        - lvgl.arc.update:
            id: arc_engine_load_left
            value: !lambda return (int)x;
        - lvgl.widget.update:
            id: arc_engine_load_left
            indicator:
              arc_color: !lambda return id(fn_state_color)(x, 9);
              arc_width: 12
  - platform: template
    id: "car_speed"
    name: "Car Speed"
    icon: mdi:speedometer
    state_class: "measurement"
    unit_of_measurement: km/h
    device_class: speed
    update_interval: never
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_speed
            text: !lambda |-
              if (isnan(x)) return std::string("0");
              char buf[10]; snprintf(buf, sizeof(buf), "%d", (int)x); return std::string(buf);
            text_color: !lambda return id(fn_state_color)(x, 10);
  - platform: template
    id: "car_acceleration"
    name: "Car Acceleration"
    icon: mdi:speedometer
    state_class: "measurement"
    unit_of_measurement: km/h/s
    device_class: speed
    update_interval: never
  - platform: sgp30
    i2c_id: ext_bus
    update_interval: 1s
    eco2:
      name: "eCO2"
      id: id_sgp30_eco2
      accuracy_decimals: 1
    tvoc:
      name: "TVOC"
      id: id_sgp30_tvoc
      accuracy_decimals: 1
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_cabin_tvoc
              text: !lambda |-
                if (isnan(x)) return std::string("--");
                char buf[10]; snprintf(buf, sizeof(buf), "%.0f", x); return std::string(buf);
              text_color: !lambda return id(fn_state_color)(x, 12);
    store_baseline: yes
    address: 0x58
  - platform: scd4x
    i2c_id: ext_bus
    update_interval: 1s
    co2:
      name: "CO2"
      id: id_scd40_co2
      accuracy_decimals: 1
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_cabin_co2
              text: !lambda |-
                if (isnan(x)) return std::string("--");
                char buf[10]; snprintf(buf, sizeof(buf), "%.0f", x); return std::string(buf);
              text_color: !lambda return id(fn_state_color)(x, 13);

    temperature:
      name: "SCD Temperature"
      id: id_scd40_temperature
    humidity:
      name: "SCD Humidity"
      id: id_scd40_humidity

interval:
  # ── 경고 팝업 제어 (1초 주기)
  - interval: 1s
    then:
      - lambda: |-
          bool a = false;
          if (!isnan(id(car_speed).state) && id(car_speed).state > 110) a = true;
          else if (!isnan(id(id_scd40_co2).state) && id(id_scd40_co2).state > 2500) a = true;
          else if (!isnan(id(id_scd40_co2).state) && id(id_scd40_co2).state > 1500) a = true;
          else if (!isnan(id(id_sgp30_tvoc).state) && id(id_sgp30_tvoc).state > 5000) a = true;
          else if (!isnan(id(id_sgp30_tvoc).state) && id(id_sgp30_tvoc).state > 3333) a = true;
          else if (!isnan(id(car_acceleration).state) && id(car_acceleration).state > 9.0) a = true;
          else if (!isnan(id(car_acceleration).state) && id(car_acceleration).state < -9.0) a = true;
          else if (!isnan(id(engine_load).state) && id(engine_load).state > 95) a = true;
          else if (!isnan(id(id_tab5_internal_temperature).state) && id(id_tab5_internal_temperature).state > 70) a = true;
          else if (!isnan(id(fuel_level).state) && id(fuel_level).state < 10) a = true;
          id(alert_active) = a;
          if (!a) id(alert_dismissed) = false;
      - if:
          condition:
            lambda: 'return id(alert_active) && !id(alert_dismissed);'
          then:
            - lvgl.widget.show:
                id: popup_alert
            - lvgl.label.update:
                id: lbl_alert_msg
                text: !lambda |-
                  const char* msg = "";
                  if (!isnan(id(car_speed).state) && id(car_speed).state > 110) msg = "과속 주의!";
                  else if (!isnan(id(id_scd40_co2).state) && id(id_scd40_co2).state > 2500) msg = "졸음 경고!";
                  else if (!isnan(id(id_scd40_co2).state) && id(id_scd40_co2).state > 1500) msg = "졸음 주의!";
                  else if (!isnan(id(id_sgp30_tvoc).state) && id(id_sgp30_tvoc).state > 5000) msg = "가스 주의!";
                  else if (!isnan(id(id_sgp30_tvoc).state) && id(id_sgp30_tvoc).state > 3333) msg = "환기 필요!";
                  else if (!isnan(id(car_acceleration).state) && id(car_acceleration).state > 9.0) msg = "급가속!";
                  else if (!isnan(id(car_acceleration).state) && id(car_acceleration).state < -9.0) msg = "급감속!";
                  else if (!isnan(id(engine_load).state) && id(engine_load).state > 95) msg = "엔진 과부하!";
                  else if (!isnan(id(id_tab5_internal_temperature).state) && id(id_tab5_internal_temperature).state > 70) msg = "장치 과열!";
                  else if (!isnan(id(fuel_level).state) && id(fuel_level).state < 10) msg = "주유 필요!";
                  return std::string(msg);
            - lvgl.widget.update:
                id: popup_alert
                bg_color: !lambda |-
                  const char* msg = "";
                  if (!isnan(id(car_speed).state) && id(car_speed).state > 110) msg = "과속 주의!";
                  else if (!isnan(id(id_scd40_co2).state) && id(id_scd40_co2).state > 2500) msg = "졸음 경고!";
                  else if (!isnan(id(id_scd40_co2).state) && id(id_scd40_co2).state > 1500) msg = "졸음 주의!";
                  else if (!isnan(id(id_sgp30_tvoc).state) && id(id_sgp30_tvoc).state > 5000) msg = "가스 주의!";
                  else if (!isnan(id(id_sgp30_tvoc).state) && id(id_sgp30_tvoc).state > 3333) msg = "환기 필요!";
                  else if (!isnan(id(car_acceleration).state) && id(car_acceleration).state > 9.0) msg = "급가속!";
                  else if (!isnan(id(car_acceleration).state) && id(car_acceleration).state < -9.0) msg = "급감속!";
                  else if (!isnan(id(engine_load).state) && id(engine_load).state > 95) msg = "엔진 과부하!";
                  else if (!isnan(id(id_tab5_internal_temperature).state) && id(id_tab5_internal_temperature).state > 70) msg = "장치 과열!";
                  else if (!isnan(id(fuel_level).state) && id(fuel_level).state < 10) msg = "주유 필요!";
                  bool is_critical = (strcmp(msg, "과속 주의!") == 0 || strcmp(msg, "졸음 경고!") == 0
                                   || strcmp(msg, "급가속!") == 0 || strcmp(msg, "급감속!") == 0
                                   || strcmp(msg, "장치 과열!") == 0);
                  return is_critical ? lv_color_hex(0xA0190F) : lv_color_hex(0x8A5500);
      - if:
          condition:
            lambda: 'return !id(alert_active) || id(alert_dismissed);'
          then:
            - lvgl.widget.hide:
                id: popup_alert
  # ── OBD 폴링 (응답 대기 없이 고정 간격으로 PID 순환; BLE/ELM 지연 여유)
  - interval: 100ms
    then:
      - if:
          condition:
            lambda: 'return id(odb_init);'
          then:
            - lambda: |-
                static std::vector<std::string> cmd_list = {
                  "0105", "011F", "012F", "0146",
                  "0142", "010C", "010D", "0104"
                };
                if (!cmd_list.empty()) {
                  id(script_ble_write).execute(cmd_list[id(obd_cmd_index)]);
                  id(obd_cmd_index) = (id(obd_cmd_index) + 1) % cmd_list.size();
                }

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP"
      icon: mdi:ip-outline
  - platform: ble_client
    ble_client_id: vlinker
    internal: True
    update_interval: never
    notify: True
    name: "vLinker response"
    id: vlink_response_text
    service_uuid: 18F0
    characteristic_uuid: 2AF0
    on_notify:
      then:
        - lambda: |-
            if (x.size() < 6) return;
            if (x.substr(0, 2) == "41") {
              uint8_t pid = x.size() >= 4 ? std::stoi(x.substr(2, 2), nullptr, 16) : 0;
              uint8_t a   = x.size() >= 6 ? std::stoi(x.substr(4, 2), nullptr, 16) : 0;
              uint8_t b   = x.size() >= 8 ? std::stoi(x.substr(6, 2), nullptr, 16) : 0;
              if (pid == 0x05) id(engine_coolant_temperature).publish_state(a - 40);
              else if (pid == 0x1F) id(engine_run_time).publish_state((a * 256) + b);
              else if (pid == 0x2F) id(fuel_level).publish_state(100 * a / 255);
              else if (pid == 0x46) id(ambient_air_temperature).publish_state(a - 40);
              else if (pid == 0x42) id(car_battery).publish_state(((a * 256) + b) / 1000.0);
              else if (pid == 0x0C) id(engine_rpm).publish_state(((a * 256) + b) / 4);
              else if (pid == 0x0D) {
                id(car_speed).publish_state(a);
                static int old_speed = 0;
                static unsigned long timer = millis();
                if (millis() - timer > 1000) {
                  id(car_acceleration).publish_state(a - old_speed);
                  old_speed = a; timer = millis();
                }
              }
              else if (pid == 0x04) id(engine_load).publish_state(100 * a / 255);
            }
  - platform: template
    name: "Time"
    internal: True
    update_interval: 1s
    lambda: |-
      char buf[20];
      auto time = id(sntp_time).now();
      sprintf(buf, "%02d:%02d", time.hour, time.minute);
      return std::string(buf);
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_time
            text: !lambda return x;
  - platform: template
    name: "Date"
    internal: True
    update_interval: 1s
    lambda: |-
      char buf[20];
      auto time = id(sntp_time).now();
      int weekday = time.day_of_week - 1;
      const char* weekdays[] = {"일", "월", "화", "수", "목", "금", "토"};
      sprintf(buf, "%02d월 %02d일 (%s)", time.month, time.day_of_month, weekdays[weekday]);
      return std::string(buf);
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_date
            text: !lambda return x;
  - platform: template
    name: "Manufacturer Data"
    id: manufacturer_data
    icon: "mdi:package-variant-closed"
  - platform: template
    name: "Parking Info"
    id: parking_info
    icon: "mdi:car"
  - platform: template
    name: "Template Engine Run Time"
    internal: True
    update_interval: 1s
    lambda: |-
      if (isnan(id(engine_run_time).state)) return std::string("--:--");
      char buf[20];
      int seconds = (int)id(engine_run_time).state;
      int minutes = seconds / 60;
      int hours = minutes / 60;
      if (hours > 0) sprintf(buf, "%d:%02d:%02d", hours, minutes % 60, seconds % 60);
      else sprintf(buf, "%02d:%02d", minutes, seconds % 60);
      return std::string(buf);
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_engine_run_time
            text: !lambda return x;
            text_color: !lambda return id(fn_state_color)(id(engine_run_time).state, 11);

touchscreen:
  - platform: gt911
    i2c_id: bsp_bus
    interrupt_pin: GPIO23
    update_interval: never
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    transform:
      swap_xy: true
      mirror_x: true
    calibration:
      x_min: 0
      x_max: 1280
      y_min: 0
      y_max: 720
    id: touch

esp_ldo:
  - voltage: 2.5V
    channel: 3

display:
  - platform: mipi_dsi
    dimensions:
      height: 1280
      width: 720
    model: M5Stack-Tab5
    rotation: 270°
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4

output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

# =================================================================
# LVGL - "Focus Drive" UI
# 레이아웃 (1280 x 720 after rotation):
#   ┌─────────────────── HEADER (72px) ───────────────────────────┐
#   │  [날짜]                [아이콘]              [시간]          │
#   ├─────────────────────────────────────────────────────────────┤
#   │  L: 연료 Arc  │  C: 속도(Hero) + RPM Arc  │  R: 운행+엔진  │
#   │    (w310)     │         (w660)             │    (w310)      │
#   │               │                            │                │
#   ├─────────────────────────────────────────────────────────────┤
#   │  BOTTOM STRIP (h=95): 실내온/습│실외온/습│외기│CO2│TVOC│탑5 │
#   └─────────────────────────────────────────────────────────────┘
# =================================================================
lvgl:
  byte_order: little_endian

  top_layer:
    widgets:
      # ── 상단 헤더 (경고는 헤더 내부 최상단 레이어) ──
      - obj:
          id: obj_header
          hidden: true
          bg_color: 0x0D1117
          border_width: 0
          border_color: 0x1E2A38
          align: top_mid
          pad_all: 0
          width: 1280
          height: 72
          x: 0
          y: 0
          widgets:
            - obj:
                align: left_mid
                x: 14
                y: 0
                width: 14
                height: 14
                radius: 7
                bg_color: 0xFF5F57
                border_width: 0
                pad_all: 0
                clickable: false
            - obj:
                align: left_mid
                x: 34
                y: 0
                width: 14
                height: 14
                radius: 7
                bg_color: 0xFEBC2E
                border_width: 0
                pad_all: 0
                clickable: false
            - obj:
                align: left_mid
                x: 54
                y: 0
                width: 14
                height: 14
                radius: 7
                bg_color: 0x28C840
                border_width: 0
                pad_all: 0
                clickable: false
            - image:
                src: img_wifi
                id: lbl_wifi
                hidden: true
                image_recolor: 0xF1C36C
                image_recolor_opa: 100%
                align: left_mid
                x: 95
                y: 0
            - image:
                src: img_vpn
                id: lbl_vpn
                hidden: true
                image_recolor: 0xF1C36C
                image_recolor_opa: 100%
                align: left_mid
                x: 160
                y: 0
            - image:
                src: img_bluetooth
                id: lbl_bluetooth
                hidden: true
                image_recolor: 0xF1C36C
                image_recolor_opa: 100%
                align: left_mid
                x: 225
                y: 0
            - label:
                id: lbl_date
                hidden: true
                text: ""
                align: right_mid
                x: -150
                y: 0
                text_color: 0xF1C36C
                text_font: notosans30
            - label:
                id: lbl_time
                hidden: true
                text: ""
                align: right_mid
                x: -10
                y: 0
                text_color: 0xE8EEF7
                text_font: notosans45
            - button:
                id: popup_alert
                hidden: true
                align: center
                width: 300
                height: 70
                bg_color: 0xA0190F
                bg_opa: COVER
                radius: 12
                border_width: 1
                border_color: 0xFFFFFF
                border_opa: 28%
                pad_all: 8
                shadow_width: 12
                shadow_ofs_x: 0
                shadow_ofs_y: 5
                shadow_spread: 0
                shadow_color: 0x000000
                shadow_opa: 38%
                outline_width: 0
                pressed:
                  shadow_width: 4
                  shadow_ofs_y: 2
                  border_opa: 18%
                on_click:
                  then:
                    - lambda: |-
                        id(alert_dismissed) = true;
                    - lvgl.widget.hide:
                        id: popup_alert
                widgets:
                  - label:
                      id: lbl_alert_msg
                      text: ""
                      align: center
                      text_color: 0xFFFFFF
                      text_font: notosans30

      # ── 부팅 스플래시 (obj_splash_content: 페이드 + 스피너) ──
      - obj:
          id: obj_splash
          bg_color: 0x0B0F14
          border_width: 0
          pad_all: 0
          align: center
          width: 1280
          height: 720
          widgets:
            - obj:
                id: obj_splash_content
                align: center
                width: 1280
                height: 720
                bg_opa: 0%
                border_width: 0
                pad_all: 0
                clickable: false
                opa: 0%
                widgets:
                  - label: { text: "COLORADO", align: top_mid, y: 88, text_color: 0xE6EDF8, text_font: notosans100 }
                  - label: { text: "Z71", align: center, x: -118, y: -68, text_color: 0xB14639, text_font: notosans150 }
                  - label: { text: "MIDNIGHT", align: center, x: 148, y: -48, text_color: 0xB9C6D7, text_font: notosans45 }
                  - label: { text: "${number}", align: center, y: 128, text_color: 0xF1C36C, text_font: notosans70 }
                  - label: { id: lbl_splash_status, text: "Booting...", align: bottom_mid, y: -128, text_color: 0xA9B8CA, text_font: notosans30 }
                  - bar:
                      id: bar_splash_progress
                      align: bottom_mid
                      y: -78
                      width: 680
                      height: 16
                      min_value: 0
                      max_value: 100
                      value: 0
                      bg_color: 0x1E2A38
                      indicator: { bg_color: 0xF1C36C }
                      border_width: 0
                      radius: 8
