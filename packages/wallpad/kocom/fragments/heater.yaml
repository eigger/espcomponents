# Kocom heater (climate) — vars: room_num, heater_name, device_id
# id: room_{room_num}_heater, device 0x36
platform: uartex
name: ${heater_name}
id: room_${room_num}_heater
visual:
  min_temperature: 5 °C
  max_temperature: 30 °C
  temperature_step: 1 °C
state:
  data:
    - 0x30
    - 0xd0
    - 0x00
    - 0x36
    - $room_num
  mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
state_temperature_current:
  offset: 12
  length: 1
  precision: 0
state_temperature_target:
  offset: 10
  length: 1
  precision: 0
state_off:
  offset: 8
  data: [0x00]
  mask: [0xf0]
state_heat:
  offset: 8
  data: [0x10]
  mask: [0xf0]
state_preset_away:
  offset: 9
  data: [0x01]
state_preset_none:
  offset: 9
  data: [0x00]
command_off: !lambda |-
  return {{0x30, 0xbc, 0x00, 0x36, $room_num, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00}, {0x30, 0xdc, 0x00, 0x36, $room_num}};
command_heat: !lambda |-
  uint8_t target = id(room_${room_num}_heater).target_temperature;
  return {{0x30, 0xbc, 0x00, 0x36, $room_num, 0x01, 0x00, 0x00, 0x11, 0x00, target, 0x00, 0x00, 0x00, 0x00, 0x00}, {0x30, 0xdc, 0x00, 0x36, $room_num}};
command_preset_none: !lambda |-
  if (id(room_${room_num}_heater).mode == climate::CLIMATE_MODE_OFF) return {};
  uint8_t target = id(room_${room_num}_heater).target_temperature;
  return {{0x30, 0xbc, 0x00, 0x36, $room_num, 0x01, 0x00, 0x00, 0x11, 0x00, target, 0x00, 0x00, 0x00, 0x00, 0x00}, {0x30, 0xdc, 0x00, 0x36, $room_num}};
command_preset_away: !lambda |-
  if (id(room_${room_num}_heater).mode == climate::CLIMATE_MODE_OFF) return {};
  uint8_t target = id(room_${room_num}_heater).target_temperature;
  return {{0x30, 0xbc, 0x00, 0x36, $room_num, 0x01, 0x00, 0x00, 0x11, 0x01, target, 0x00, 0x00, 0x00, 0x00, 0x00}, {0x30, 0xdc, 0x00, 0x36, $room_num}};
command_temperature: !lambda |-
  if (id(room_${room_num}_heater).mode == climate::CLIMATE_MODE_OFF) return {};
  uint8_t target = x;
  return {{0x30, 0xbc, 0x00, 0x36, $room_num, 0x01, 0x00, 0x00, 0x11, 0x00, target, 0x00, 0x00, 0x00, 0x00, 0x00}, {0x30, 0xdc, 0x00, 0x36, $room_num}};
command_update:
  data:
    - 0x30
    - 0xbc
    - 0x00
    - 0x36
    - $room_num
    - 0x01
    - 0x00
    - 0x3a
    - 0x00
    - 0x00
    - 0x00
    - 0x00
    - 0x00
    - 0x00
    - 0x00
    - 0x00
  ack:
    - 0x30
    - 0xdc
    - 0x00
    - 0x36
    - $room_num
update_interval: 2h
device_id: ${device_id}
