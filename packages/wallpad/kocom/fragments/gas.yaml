# Kocom gas lock — vars: device_id (집당 1개, room 바이트 0x00 고정)
# id: gas, device 0x2c
platform: uartex
name: "Gas Buner Lock"
icon: mdi:gas-burner
id: gas
state:
  data: [0x30, 0xd0, 0x00, 0x2c, 0x00]
  mask: [0xff, 0xf0, 0xff, 0xff, 0xff]
state_unlocked:
  offset: 7
  data: [0x01]
state_locked:
  offset: 7
  data: [0x02]
command_lock:
  data: [0x30, 0xbc, 0x00, 0x2c, 0x00, 0x01, 0x00, 0x02, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
  ack: [0x30, 0xdc, 0x00, 0x2c, 0x00]
command_update:
  data: [0x30, 0xbc, 0x00, 0x2c, 0x00, 0x01, 0x00, 0x3a, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
  ack: [0x30, 0xdc, 0x00, 0x2c, 0x00]
update_interval: 2h
device_id: ${device_id}
