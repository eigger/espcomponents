# Kocom elevator call — vars: device_id
platform: uartex
name: "Elevator Call"
icon: mdi:elevator
optimistic: true
state_off:
  data: [0x30, 0x00, 0x00, 0x44]
  mask: [0xff, 0x00, 0xff, 0xff]
command_on:
  data: [0x30, 0xbc, 0x00, 0x01, 0x00, 0x44, 0x00, 0x01, 0x03, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
  ack: [0x30, 0xdc]
on_turn_on:
  - lambda: |-
      id(id_elevator_state).publish_state("호출");
device_id: ${device_id}
