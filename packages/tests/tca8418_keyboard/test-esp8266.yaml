esphome:
  name: test-esp8266-tca8418-keyboard
esp8266:
  board: nodemcuv2
external_components:
  - source: github://eigger/espcomponents
    components: [ tca8418_keyboard ]
    refresh: always

i2c:
  sda: GPIO4
  scl: GPIO5

tca8418_keyboard:
  address: 0x34
  model: cardputer_adv   # key layout / scan remap (default)
  irq_pin:
    number: GPIO12
    mode: INPUT
  # Automation triggers (the pressed key string is passed as `x`)
  on_key_press:
    - lambda: |-
        ESP_LOGI("kb", "pressed: %s", x.c_str());
  on_key_release:
    - lambda: |-
        ESP_LOGI("kb", "released: %s", x.c_str());
  # Optional text sensors (e.g. to show the last key in Home Assistant)
  press_key:
    name: press key
  release_key:
    name: release key