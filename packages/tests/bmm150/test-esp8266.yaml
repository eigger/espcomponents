esphome:
  name: test-esp8266-bmm150
esp8266:
  board: nodemcuv2
external_components:
  - source: github://eigger/espcomponents
    components: [ bmm150 ]
    refresh: always
    
i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true
     
sensor:
  - platform: bmm150
    address: 0x10
    update_interval: 30s
    magnetic_field_x:
      name: "MAG X"
    magnetic_field_y:
      name: "MAG Y"
    magnetic_field_z:
      name: "MAG Z"