esphome:
  name: test-esp8266-bbq10-keyboard
esp8266:
  board: nodemcuv2
external_components:
  - source: github://eigger/espcomponents
    components: [ bbq10_keyboard ]
    refresh: always

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true

bbq10_keyboard:
  key:
    name: Key
  last_key:
    name: Last Key