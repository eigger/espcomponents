esphome:
  name: test-bbq10-keyboard
esp32:
  board: esp32dev
  framework:
    type: esp-idf
external_components:
  - source: github://eigger/espcomponents
    components: [ bbq10_keyboard ]
    refresh: always

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

bbq10_keyboard:
  key:
    name: Key
  last_key:
    name: Last Key