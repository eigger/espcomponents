esphome:
  name: test-axp192

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source: github://eigger/espcomponents
    components: [ axp192 ]
    refresh: always

i2c:
  - id: bus_a
    sda: GPIO21
    scl: GPIO22
    scan: true

axp192:
  address: 0x34
  i2c_id: bus_a
  update_interval: 30s
  battery_level:
    name: "Battery Level"
  battery_state:
    name: "Battery State"
  battery_charging:
    name: "Battery Charging"
  brightness:
    name: "Screen Brightness"
  poweroff:
    name: "Power Off Button"