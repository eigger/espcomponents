esphome:
  name: test-esp8266-focaltech

esp8266:
  board: nodemcuv2

external_components:
  - source: github://eigger/espcomponents
    components: [ focaltech ]
    refresh: always

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true

touchscreen:
  - platform: focaltech
    interrupt_pin: GPIO12
    reset_pin: GPIO13

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
