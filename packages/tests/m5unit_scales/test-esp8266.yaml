esphome:
  name: test-esp8266-m5unit-scales
esp8266:
  board: nodemcuv2
external_components:
  - source: github://eigger/espcomponents
    components: [ m5unit_scales ]
    refresh: always

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true

# Main Hub Component
m5unit_scales:
  id: my_scale
  model: MINI  # MINI (Unit-Mini Scales) or STANDARD (Unit Scales)
  address: 0x26
  update_interval: 1s

# Exposed Sensors
sensor:
  - platform: m5unit_scales
    weight:
      name: "Scale Weight"
    raw_adc:
      name: "Scale Raw ADC"

# Binary Sensor for physical button
binary_sensor:
  - platform: m5unit_scales
    button:
      name: "Scale Button"

# Tare Trigger
button:
  - platform: m5unit_scales
    tare:
      name: "Scale Tare"

# RGB LED Output
light:
  - platform: m5unit_scales
    name: "Scale LED"

# Filter Controls (Only supported/used on MINI model)
switch:
  - platform: m5unit_scales
    lp_filter:
      name: "Scale LP Filter"

number:
  - platform: m5unit_scales
    avg_filter:
      name: "Scale Avg Filter"
    ema_filter:
      name: "Scale EMA Filter"
    gap:
      name: "Scale Gap Value"